<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 400" data-archetype="incisor">
  <defs>
    <linearGradient id="enamel-i" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F4F4F5"/>
      <stop offset="1" stop-color="#D4D4D8"/>
    </linearGradient>
    <linearGradient id="dentin-i" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FDE68A"/>
      <stop offset="1" stop-color="#F59E0B"/>
    </linearGradient>
  </defs>

  <!-- Esmalte (corona): incisivo plano, ligeramente cónico -->
  <path id="enamel-shape"
        d="M 75 30 Q 70 70 70 110 L 130 110 Q 130 70 125 30 Z"
        fill="url(#enamel-i)" stroke="#E5E7EB" stroke-width="1"/>

  <!-- Dentina: forma del diente entera -->
  <path id="dentin-shape"
        d="M 80 35 Q 76 75 76 115 L 70 200 Q 68 280 80 360 Q 100 380 120 360 Q 132 280 130 200 L 124 115 Q 124 75 120 35 Z"
        fill="url(#dentin-i)" stroke="#D97706" stroke-width="0.5" opacity="0.85"/>

  <!-- Cámara pulpar (corona): pequeña en incisivos -->
  <path id="pulp-chamber"
        d="M 92 80 Q 90 100 92 130 L 108 130 Q 110 100 108 80 Z"
        fill="#7F1D1D" opacity="0.65"/>

  <!-- Conducto único: vertical, recto, cónico hacia ápice -->
  <g id="canal-unico" data-canal-name="Conducto único">
    <path d="M 100 130 Q 99 240 100 360"
          fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
    <circle cx="100" cy="362" r="2.5" fill="currentColor"/>
  </g>

  <!-- Etiquetas técnicas -->
  <g id="labels" font-family="ui-sans-serif, system-ui" font-size="10" fill="#71717A">
    <text x="142" y="50">Corona</text>
    <text x="142" y="200">Raíz</text>
    <text x="142" y="362">Ápice</text>
  </g>
</svg>
