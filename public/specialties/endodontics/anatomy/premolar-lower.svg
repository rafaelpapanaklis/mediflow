<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 400" data-archetype="premolar-lower">
  <defs>
    <linearGradient id="enamel-pl" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F4F4F5"/>
      <stop offset="1" stop-color="#D4D4D8"/>
    </linearGradient>
    <linearGradient id="dentin-pl" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FDE68A"/>
      <stop offset="1" stop-color="#F59E0B"/>
    </linearGradient>
  </defs>

  <!-- Corona inferior: una cúspide V dominante -->
  <path id="enamel-shape"
        d="M 75 35 Q 78 25 92 30 L 100 50 L 108 30 Q 122 25 125 35 Q 130 75 130 110 L 70 110 Q 70 75 75 35 Z"
        fill="url(#enamel-pl)" stroke="#E5E7EB" stroke-width="1"/>

  <!-- Dentina raíz cónica -->
  <path id="dentin-shape"
        d="M 78 40 Q 76 80 76 115 L 73 230 Q 72 330 88 370 Q 100 380 112 370 Q 128 330 127 230 L 124 115 Q 124 80 122 40 Z"
        fill="url(#dentin-pl)" stroke="#D97706" stroke-width="0.5" opacity="0.85"/>

  <!-- Cámara pulpar -->
  <path id="pulp-chamber"
        d="M 84 80 Q 82 110 88 135 L 112 135 Q 118 110 116 80 Z"
        fill="#7F1D1D" opacity="0.65"/>

  <!-- Conducto único -->
  <g id="canal-unico" data-canal-name="Conducto único">
    <path d="M 100 135 Q 99 255 100 372"
          fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
    <circle cx="100" cy="374" r="2.5" fill="currentColor"/>
  </g>

  <g id="labels" font-family="ui-sans-serif, system-ui" font-size="10" fill="#71717A">
    <text x="142" y="50">Corona</text>
    <text x="142" y="220">Raíz</text>
    <text x="142" y="375">Ápice</text>
  </g>
</svg>
