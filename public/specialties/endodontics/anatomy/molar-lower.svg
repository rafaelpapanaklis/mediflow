<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 400" data-archetype="molar-lower">
  <defs>
    <linearGradient id="enamel-ml" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F4F4F5"/>
      <stop offset="1" stop-color="#D4D4D8"/>
    </linearGradient>
    <linearGradient id="dentin-ml" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FDE68A"/>
      <stop offset="1" stop-color="#F59E0B"/>
    </linearGradient>
  </defs>

  <!-- Corona ancha con 5 cúspides -->
  <path id="enamel-shape"
        d="M 50 38 Q 55 25 68 28 L 78 50 L 90 28 L 100 50 L 110 28 L 122 50 L 132 28 Q 145 25 150 38 Q 153 78 150 115 L 50 115 Q 47 78 50 38 Z"
        fill="url(#enamel-ml)" stroke="#E5E7EB" stroke-width="1"/>

  <!-- Dentina con 2 raíces (mesial y distal) — la mesial alberga MV y ML -->
  <path id="dentin-shape"
        d="M 55 45 Q 53 85 55 120 L 52 220
           Q 42 320 60 365 Q 75 376 90 365 Q 100 320 100 220
           Q 100 320 110 365 Q 125 376 140 365 Q 158 320 148 220 L 145 120
           Q 147 85 145 45 Z"
        fill="url(#dentin-ml)" stroke="#D97706" stroke-width="0.5" opacity="0.85"/>

  <!-- Cámara pulpar -->
  <path id="pulp-chamber"
        d="M 60 80 Q 58 115 65 145 L 135 145 Q 142 115 140 80 Z"
        fill="#7F1D1D" opacity="0.65"/>

  <!-- Conducto MV (mesiovestibular) -->
  <g id="canal-mv" data-canal-name="Mesiovestibular">
    <path d="M 72 145 Q 64 250 68 360"
          fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
    <circle cx="68" cy="362" r="2.5" fill="currentColor"/>
  </g>

  <!-- Conducto ML (mesiolingual) -->
  <g id="canal-ml" data-canal-name="Mesiolingual">
    <path d="M 88 145 Q 90 250 86 360"
          fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
    <circle cx="86" cy="362" r="2.5" fill="currentColor"/>
  </g>

  <!-- Conducto D (distal) — más amplio típicamente -->
  <g id="canal-d" data-canal-name="Distal">
    <path d="M 130 145 Q 130 250 132 360"
          fill="none" stroke="currentColor" stroke-width="3.4" stroke-linecap="round"/>
    <circle cx="132" cy="362" r="2.8" fill="currentColor"/>
  </g>

  <g id="labels" font-family="ui-sans-serif, system-ui" font-size="10" fill="#71717A">
    <text x="46" y="375">MV</text>
    <text x="76" y="375">ML</text>
    <text x="125" y="375">D</text>
  </g>
</svg>
